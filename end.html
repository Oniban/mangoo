<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>End Sem Schedule - MANGO</title>
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="styles/end.css">
  <link rel="icon" type="image/x-icon" href="assets/images/logo icon.jpg">
  <style>
    .back-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 1200;
      background: linear-gradient(135deg, #3b4454 0%, #4f5d73 25%);
      color: #ddaf54;
      font-family: 'coolfont', system-ui;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.35);
      transition: transform 0.2s ease, background 0.2s ease;
      border: 1px solid rgba(221, 175, 84, 0.25);
    }
    .back-btn:hover {
      background: rgba(255, 255, 255, 0.22);
      transform: scale(1.06);
      color: #FFD700;
    }
    h1 {
      padding-top: 60px;
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-btn">← Home</a>

  <h1>End Sem Schedule</h1>

  <div class="branch-selector">
    <button class="branch-btn active" id="mechBtn" onclick="selectBranch('mech')">
      ⚙️ Mech Sem
    </button>
    <button class="branch-btn" id="elecBtn" onclick="selectBranch('elec')">
      ⚡ Elec Sem
    </button>
  </div>

  <div id="examContainer" class="exam-container"></div>

  <script src="features/end.js"></script>
</body>
</html>
