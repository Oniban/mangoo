<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MANGO</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="images/logo icon.jpg">

  <style>
    .search-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 18px auto 8px;
      gap: 8px;
    }

    .search-wrapper {
      display: flex;
      gap: 10px;
      align-items: center;
      background: #111;
      border-radius: 16px;
      padding: 14px 18px;
      width: 800px;
      max-width: 92vw;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
    }

    .search-wrapper::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url(images/81CvJNeGE8L._AC_UF894\,1000_QL80_.jpg);
      background-position: center;
      filter: blur(4px);
      z-index: 0;
    }

    .search-wrapper > * { position: relative; z-index: 1; }

    #rollInput {
      flex: 1;
      background: rgba(0,0,0,0.45);
      border: 1.5px solid rgba(255,215,0,0.3);
      border-radius: 10px;
      color: #FFD700;
      font-family: 'coolfont';
      font-size: 1.05em;
      padding: 10px 16px;
      outline: none;
      letter-spacing: 0.05em;
    }

    #searchBtn {
      background: #AFC3B4;
      color: #1E3A5F;
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      font-family: 'coolfont';
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
    }

    .sat-controls {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 40px 0 60px;
    }

    .sat-btn {
      background: #AFC3B4;
      color: #1E3A5F;
      border: none;
      padding: 12px 26px;
      font-family: 'coolfont';
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .sat-btn:hover {
      background: #FFD700;
      transform: scale(1.05);
    }

    .sat-btn.remove {
      background: #e74c3c;
      color: white;
    }

    .sat-btn.remove:hover {
      background: #c0392b;
    }
  </style>
</head>

<body>
  <div class="main-content" id="mainContent">
    <h1>M A N G O</h1>

    <div class="search-section">
      <div class="search-wrapper">
        <input type="text" id="rollInput" placeholder="Enter Roll Number  (e.g. 2501ME63)" autocomplete="off">
        <button id="searchBtn">VIEW SCHEDULE</button>
      </div>
    </div>

    <div class="content-wrapper" id="timetableContainer"></div>

    <div class="sat-controls">
      <button id="addSatBtn" class="sat-btn">➕ Add Saturday Class</button>
      <button id="removeSatBtn" class="sat-btn remove">➖ Remove Saturday Schedule</button>
    </div>
  </div>
  <div class="dock">
    <button class="dock-btn" id="hamburgerBtn" title="Study Material">
      <img src="images/bookk.png">
    </button>
    <button class="dock-btn" title="Bus Schedule" onclick="window.open('bus.html','_blank')">
      <img src="images/bus icon.png" alt="Menu">
    </button>
    <button class="dock-btn" title="Mess Schedule" onclick="window.open('mess.html','_blank')">
      <img src="images/fooood.png">
    <!-- </button>
    <button class="dock-btn" title="Room Checker" onclick="window.open('exam.html','_blank')" style="background:#7BAAA1; font-size:20px; color:#1E3A5F; font-weight:bold;">
      <img src="images/room-icon (1).svg">
    </button> -->
  </div>

    <div class="sidebar-content">

          <li><a href="https://cciitpatna-my.sharepoint.com/:f:/g/personal/sushmitha_iitp_ac_in/IgBiT1AJnHlARrwlKaHjjnKwAUq9PtGAo2HktKlLHIsvs8k?e=iQgxHE" target="_blank">Maths (Probability)</a></li>
          <li><a href="images/Chemistry Notes.pdf" target="_blank">Chemistry</a></li>
          <li><a href="https://cciitpatna.sharepoint.com/sites/ME1202G1-6/Class%20Materials" target="_blank">Mechanics</a></li>
          <li><a href="http://172.30.1.9/~samrat/2026/CS1201/" target="_blank">CS</a></li>
        </ul>
      </nav>
    </div>
  </div>
  <script src="timetable-data.js"></script>
  <script src="index.js"></script>
</body>
</html>
